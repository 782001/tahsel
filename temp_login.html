<!doctype html>

<html class="light" dir="rtl" lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>تسجيل الدخول - تحصيل</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&amp;family=Manrope:wght@400;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#2e7d32",
              "on-tertiary-fixed": "#2e1500",
              error: "#ba1a1a",
              "on-primary-fixed": "#002204",
              "on-error-container": "#93000a",
              "on-secondary": "#ffffff",
              secondary: "#005db7",
              "inverse-on-surface": "#f1f1f1",
              "on-primary": "#ffffff",
              "inverse-primary": "#88d982",
              "surface-container-low": "#f3f3f3",
              "secondary-fixed": "#d6e3ff",
              "surface-bright": "#f9f9f9",
              "secondary-fixed-dim": "#a9c7ff",
              primary: "#0d631b",
              "on-primary-fixed-variant": "#005312",
              "surface-dim": "#dadada",
              "on-secondary-fixed-variant": "#00468c",
              "surface-container-lowest": "#ffffff",
              "on-secondary-container": "#003670",
              "error-container": "#ffdad6",
              "on-secondary-fixed": "#001b3d",
              "surface-container": "#eeeeee",
              "inverse-surface": "#2f3131",
              "on-primary-container": "#cbffc2",
              outline: "#707a6c",
              "surface-variant": "#e2e2e2",
              "on-tertiary": "#ffffff",
              surface: "#f9f9f9",
              "on-error": "#ffffff",
              "on-surface": "#1a1c1c",
              "surface-tint": "#1b6d24",
              "on-surface-variant": "#40493d",
              "surface-container-high": "#e8e8e8",
              "outline-variant": "#bfcaba",
              "tertiary-fixed": "#ffdcc2",
              "surface-container-highest": "#e2e2e2",
              "on-background": "#1a1c1c",
              "on-tertiary-container": "#ffefe5",
              background: "#f9f9f9",
              "secondary-container": "#64a1ff",
              "primary-fixed-dim": "#88d982",
              "on-tertiary-fixed-variant": "#6d3a00",
              "tertiary-fixed-dim": "#ffb77b",
              "tertiary-container": "#a65b00",
              tertiary: "#834600",
              "primary-fixed": "#a3f69c",
            },
            fontFamily: {
              headline: ["IBM Plex Sans Arabic", "Manrope"],
              body: ["IBM Plex Sans Arabic", "Inter"],
              label: ["IBM Plex Sans Arabic", "Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "1rem",
              xl: "1.25rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        font-family: "IBM Plex Sans Arabic", sans-serif;
        background-color: #f5f5f5;
      }
      h1,
      h2,
      h3 {
        font-family: "IBM Plex Sans Arabic", sans-serif;
      }
      .material-symbols-outlined.rtl-flip {
        transform: scaleX(-1);
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen text-on-surface">
    <main class="flex-grow flex items-center justify-center px-6 py-12">
      <div class="w-full max-w-md">
        <!-- Branding Area -->
        <div class="mb-10 text-center">
          <div
            class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container mb-4 shadow-sm"
          >
            <span
              class="material-symbols-outlined text-white text-3xl"
              data-icon="account_balance"
              >account_balance</span
            >
          </div>
          <h1 class="text-2xl font-extrabold tracking-tight text-on-surface">
            تحصيل
          </h1>
          <p class="text-on-surface-variant font-label text-sm mt-1">
            دير مشروعك باحترافية وسهولة.
          </p>
        </div>
        <!-- Login Card -->
        <div
          class="bg-surface-container-lowest rounded-lg p-8 shadow-[0_8px_24px_rgba(26,28,28,0.04)]"
        >
          <h2 class="text-xl font-bold mb-6 text-on-surface text-right">
            أهلاً بك مجدداً
          </h2>
          <form action="#" class="space-y-6" method="POST">
            <!-- Email Field -->
            <div>
              <label
                class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2 mr-1 text-right"
                for="email"
              >
                عنوان الإيميل
              </label>
              <div class="relative">
                <input
                  class="w-full px-4 py-3.5 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-primary/40 text-on-surface placeholder:text-outline-variant transition-all text-right"
                  dir="ltr"
                  id="email"
                  name="email"
                  placeholder="name@company.com"
                  required=""
                  type="email"
                />
              </div>
            </div>
            <!-- Password Field -->
            <div>
              <div class="flex justify-between items-center mb-2 mr-1">
                <label
                  class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider"
                  for="password"
                >
                  كلمة السر
                </label>
                <a
                  class="text-xs font-semibold text-secondary hover:underline"
                  href="#"
                  >نسيت كلمة السر؟</a
                >
              </div>
              <div class="relative">
                <input
                  class="w-full px-4 py-3.5 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-primary/40 text-on-surface placeholder:text-outline-variant transition-all text-right"
                  dir="ltr"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  required=""
                  type="password"
                />
              </div>
            </div>
            <!-- Remember Me -->
            <!-- Login Button -->
            <button
              class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-lg shadow-md hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
              type="submit"
            >
              <span>تسجيل الدخول</span>
              <span
                class="material-symbols-outlined text-sm rtl-flip"
                data-icon="arrow_forward"
                >arrow_forward</span
              >
            </button>
          </form>
          <div class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
            <p class="text-sm text-on-surface-variant">
              ليس لديك حساب؟
              <a class="text-primary font-bold hover:underline mr-1" href="#"
                >تواصل مع المدير</a
              >
            </p>
          </div>
        </div>
        <!-- Footer Links -->
        <div class="mt-8 flex justify-center space-x-6 space-x-reverse">
          <a
            class="text-xs text-outline font-medium hover:text-on-surface-variant transition-colors"
            href="#"
            >سياسة الخصوصية</a
          >
          <a
            class="text-xs text-outline font-medium hover:text-on-surface-variant transition-colors"
            href="#"
            >شروط الخدمة</a
          >
          <a
            class="text-xs text-outline font-medium hover:text-on-surface-variant transition-colors"
            href="#"
            >مركز المساعدة</a
          >
        </div>
      </div>
    </main>
    <!-- Background Decoration (Subtle Tonal Depth) -->
    <div
      class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none"
    >
      <div
        class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"
      ></div>
      <div
        class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"
      ></div>
    </div>
  </body>
</html>
